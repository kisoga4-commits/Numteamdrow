<!-- Main shell for the offline-first animation web app. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/layout.css" />
    <link rel="stylesheet" href="./styles/toolbar.css" />
    <link rel="stylesheet" href="./styles/stage.css" />
    <link rel="stylesheet" href="./styles/properties.css" />
    <link rel="stylesheet" href="./styles/timeline.css" />
    <link rel="stylesheet" href="./styles/modal.css" />
    <link rel="stylesheet" href="./styles/responsive.css" />
    <title>Animation App (Offline-first PWA)</title>
  </head>
  <body>
    <div id="app" class="app-grid">
      <aside id="toolbar" class="toolbar"></aside>
      <main id="stage-area" class="stage-area"></main>
      <aside id="properties-panel" class="properties-panel"></aside>
      <section id="timeline" class="timeline"></section>
    </div>

    <input id="import-input" type="file" accept="application/json" hidden />

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
